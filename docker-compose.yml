x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  restart: unless-stopped
  ports:
    - "127.0.0.1:11434:11434"
  volumes:
    - ollama_data:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  container_name: ollama-pull-llama
  volumes:
    - ollama_data:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "sleep 3; ollama pull ${OLLAMA_MODEL}; sleep 3; ollama pull ${OLLAMA_JUDGE_MODEL}; sleep 3; ollama pull ${OLLAMA_EMBED_MODEL}"

services:
  api:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_JUDGE_MODEL=${OLLAMA_JUDGE_MODEL:-mistral}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
      - CHROMA_PERSIST_DIR=/chroma/data
      - API_KEY=${API_KEY:-}
      - MAX_UPLOAD_SIZE_BYTES=${MAX_UPLOAD_SIZE_BYTES:-10485760}
      - MAX_TOP_K=${MAX_TOP_K:-20}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS:-20000}
    volumes:
      - chroma_data:/chroma/data
    depends_on:
      ollama-pull-llama-cpu:
        condition: service_completed_successfully
        required: false
      ollama-pull-llama-gpu-amd:
        condition: service_completed_successfully
        required: false
      ollama-pull-llama-gpu-nvidia:
        condition: service_completed_successfully
        required: false
      mlflow:
        condition: service_started
    restart: on-failure

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-gpu-nvidia:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
      - ollama-gpu-amd

  ollama-pull-llama-gpu-nvidia:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu-nvidia

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./mlflow/data:/mlflow/data
      - ./mlflow/artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/data/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts "localhost,127.0.0.1,mlflow,mlflow:5000"
      --cors-allowed-origins "http://localhost:5000,http://127.0.0.1:5000"

volumes:
  ollama_data:
  chroma_data:
